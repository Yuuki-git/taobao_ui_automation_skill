<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Product Detail</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --line: #e2e8f0;
      --accent: #ff5000;
      --text: #0f172a;
      --ok-bg: #ecfdf5;
      --ok-text: #166534;
    }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #fff7ed 0%, var(--bg) 40%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 24px;
    }
    .title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.3;
    }
    .price {
      color: var(--accent);
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .meta {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .mock-add-to-cart {
      border: 0;
      border-radius: 10px;
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .cart-success {
      border-radius: 8px;
      background: var(--ok-bg);
      color: var(--ok-text);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1 class="title">蓝牙耳机 B</h1>
      <div class="price">¥299</div>
      <div class="meta">官方旗舰店 | 好评率 99.3% | 1.2万+人付款</div>

      <div class="actions">
        <button class="mock-add-to-cart" data-testid="mock-add-to-cart" type="button">
          Add to cart
        </button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var button = document.querySelector(".mock-add-to-cart");
      var actionWrap = document.querySelector(".actions");
      if (!button || !actionWrap) return;
      button.addEventListener("click", function () {
        if (document.querySelector(".cart-success")) return;
        var success = document.createElement("div");
        success.className = "cart-success";
        success.setAttribute("data-testid", "mock-cart-success");
        success.textContent = "加入购物车成功 / Added to cart";
        actionWrap.appendChild(success);
      });
    })();
  </script>
</body>
</html>
